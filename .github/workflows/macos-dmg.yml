name: Build macOS DMG

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dmg:
    name: Build DMG
    runs-on: macos-latest
    env:
      APP_NAME: Clipy RS
      DMG_NAME: Clipy RS
      MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Import signing certificate
        if: env.MACOS_CERTIFICATE_P12_BASE64 != '' && env.MACOS_CERTIFICATE_PASSWORD != ''
        env:
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build-signing.keychain-db"

          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build unsigned DMG
        if: env.MACOS_CERTIFICATE_P12_BASE64 == '' || env.MACOS_CERTIFICATE_PASSWORD == '' || env.MACOS_SIGN_IDENTITY == '' || env.APPLE_ID == '' || env.APPLE_TEAM_ID == '' || env.APPLE_APP_PASSWORD == ''
        run: scripts/package-macos-dmg.sh

      - name: Build signed and notarized DMG
        if: env.MACOS_CERTIFICATE_P12_BASE64 != '' && env.MACOS_CERTIFICATE_PASSWORD != '' && env.MACOS_SIGN_IDENTITY != '' && env.APPLE_ID != '' && env.APPLE_TEAM_ID != '' && env.APPLE_APP_PASSWORD != ''
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: scripts/package-macos-release.sh

      - name: Prepare artifact
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/macos-dmg/Clipy RS.dmg" "dist/Clipy-RS-main.dmg"
          shasum -a 256 "dist/Clipy-RS-main.dmg" > "dist/Clipy-RS-main.dmg.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: clipy-rs-macos-dmg-${{ github.sha }}
          path: |
            dist/Clipy-RS-main.dmg
            dist/Clipy-RS-main.dmg.sha256
          if-no-files-found: error

      - name: Publish latest main release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git tag -f main-latest "$GITHUB_SHA"
          git push origin -f main-latest

          if gh release view main-latest >/dev/null 2>&1; then
            gh release edit main-latest \
              --title "Latest main build" \
              --notes "Automatically built from main commit $GITHUB_SHA."
          else
            gh release create main-latest \
              --title "Latest main build" \
              --notes "Automatically built from main commit $GITHUB_SHA." \
              --latest=false
          fi

          gh release upload main-latest \
            "dist/Clipy-RS-main.dmg" \
            "dist/Clipy-RS-main.dmg.sha256" \
            --clobber
