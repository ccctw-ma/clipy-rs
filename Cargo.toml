[package]
name = "clipy-rs"
version = "0.1.0"
edition = "2024"
description = "A small macOS clipboard history tool inspired by Clipy."
license = "MIT"

[dependencies]
objc2 = { version = "0.6.3" }
objc2-app-kit = { version = "0.3.2", features = [
    "objc2-core-foundation",
    "NSButton",
    "NSControl",
    "NSApplication",
    "NSMenu",
    "NSMenuItem",
    "NSResponder",
    "NSRunningApplication",
    "NSStatusBar",
    "NSStatusBarButton",
    "NSStatusItem",
    "NSView",
] }
objc2-foundation = { version = "0.3.2", features = [
    "NSDate",
    "NSNotification",
    "NSObject",
    "NSString",
    "NSTimer",
] }
